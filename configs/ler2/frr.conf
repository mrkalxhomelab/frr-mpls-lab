frr version 9.0
frr defaults traditional
hostname ler2
log syslog informational
!
interface lo
 ip address 20.20.20.1/32
!
interface eth1
 ip address 10.0.2.2/30
 mpls enable
!
router isis main
 net 49.0001.2020.2020.0001.00
 is-type level-2-only
 metric-style wide
 !
 interface lo
  passive
 !
 interface eth1
  isis circuit-type level-2-only
  isis network point-to-point
!
mpls ldp
 router-id 20.20.20.1
 !
 address-family ipv4
  discovery transport-address 20.20.20.1
  !
  interface eth1
 !
!
