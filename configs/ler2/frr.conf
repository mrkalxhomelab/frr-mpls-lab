frr version 9.0
frr defaults traditional
hostname ler2
log syslog informational
!
interface lo
 ip address 20.20.20.1/32
 ip router isis main
!
interface eth1
 ip address 10.0.2.2/30
 mpls enable
 ip router isis main
 isis circuit-type level-2-only
 isis network point-to-point
!
router isis main
 net 49.0001.2020.2020.0001.00
 is-type level-2-only
 metric-style wide
!
mpls ldp
 router-id 20.20.20.1
 !
 address-family ipv4
  discovery transport-address 20.20.20.1
  !
  targeted-neighbor
   hello holdtime 180
   hello interval 10
  !
  neighbor 2.2.2.2 targeted
  !
  interface eth1
 !
!
