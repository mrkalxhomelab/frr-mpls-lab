frr version 9.0
frr defaults traditional
hostname r4
log syslog informational
!
interface lo
 ip address 4.4.4.4/32
 ip router isis main
!
interface eth1
 ip address 10.0.34.2/30
 mpls enable
 ip router isis main
 isis circuit-type level-2-only
 isis network point-to-point
!
interface eth2
 ip address 10.0.41.1/30
 mpls enable
 ip router isis main
 isis circuit-type level-2-only
 isis network point-to-point
!
router isis main
 net 49.0001.0400.0400.0004.00
 is-type level-2-only
 metric-style wide
 mpls-te on
 mpls-te router-address 4.4.4.4
!
mpls ldp
 router-id 4.4.4.4
 !
 address-family ipv4
  discovery transport-address 4.4.4.4
  !
  interface eth1
  interface eth2
 !
!
