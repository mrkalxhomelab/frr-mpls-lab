frr version 9.0
frr defaults traditional
hostname ler1
log syslog informational
!
interface lo
 ip address 10.10.10.1/32
 ip router isis main
!
interface eth1
 ip address 10.0.1.2/30
 mpls enable
 ip router isis main
 isis circuit-type level-2-only
 isis network point-to-point
!
router isis main
 net 49.0001.1010.1010.0001.00
 is-type level-2-only
 metric-style wide
!
mpls ldp
 router-id 10.10.10.1
 !
 address-family ipv4
  discovery transport-address 10.10.10.1
  !
  targeted-neighbor
   hello holdtime 180
   hello interval 10
  !
  neighbor 1.1.1.1 targeted
  !
  interface eth1
 !
!
